appId: com.excellence.app
productName: Excellence
directories:
  buildResources: assets
  output: release
files:
  - apps/shell/dist/**/*
  - apps/renderer/dist/**/*
  - packages/*/dist/**/*
  - node_modules/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  category: public.app-category.productivity
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icon.png
  category: Office
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
extraResources:
  - from: services/
    to: services/
    filter:
      - '**/*'
      - '!**/__pycache__/**'
      - '!**/.venv/**'
